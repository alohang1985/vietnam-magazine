name: Remove Budget Tables

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install --no-fund --no-audit axios --ignore-scripts
      - run: node scripts/remove-budget.js
        env:
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
          STRAPI_URL: https://vietnam-magazine-production.up.railway.app
