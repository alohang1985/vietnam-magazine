name: Add Images to Posts

on:
  workflow_dispatch:

jobs:
  add-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install --no-fund --no-audit axios --ignore-scripts
      - name: Add images to posts
        run: node scripts/add-images.js
        env:
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
          STRAPI_URL: https://vietnam-magazine-production.up.railway.app
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
